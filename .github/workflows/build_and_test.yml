name: Pamplejuce

on:
  workflow_dispatch: # Lets you run a build manually from the GitHub UI
  workflow_call:     # Lets other workflows (like release.yml) call this one
  push:
    branches:
      - main
      - develop
  pull_request:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  BUILD_DIR: Builds
  SCCACHE_GHA_ENABLED: true
  PLUGINVAL_BINARY: ./pluginval.exe
  EXTRA_FLAGS: -G Ninja -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl

defaults:
  run:
    shell: bash

jobs:
  build_and_test:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    name: Windows Build
    runs-on: windows-latest

    steps:
      # Setup MSVC toolchain and developer command prompt
      - uses: ilammy/msvc-dev-cmd@v1

      # Install IPP explicitly to the NuGet global cache path
      - name: Install IPP
        run: |
          nuget install intelipp.static.win-x64 -Version 2026.0.0.712 -OutputDirectory "$USERPROFILE/.nuget/packages"

      # Install Ninja
      - name: Install Ninja
        run: choco install ninja

      # Checkout recursive submodules (JUCE)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Cache the build artifact outputs
      - name: Cache the build
        uses: mozilla-actions/sccache-action@v0.0.10

      # Configure CMake with Windows-specific compiler flags
      - name: Configure
        run: cmake -B ${{ env.BUILD_DIR }} -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache ${{ env.EXTRA_FLAGS }} .

      # Build Targets
      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ env.BUILD_TYPE }} --parallel

      # Test & Benchmarks via CTest
      - name: Test & Benchmarks
        working-directory: ${{ env.BUILD_DIR }}
        run: ctest --verbose --output-on-failure

      # Read in configuration environment vars generated by CMake or fall back to parsing CMakeLists.txt
      - name: Read in .env from CMake
        run: |
          FOUND_ENV=$(find . -name ".env" -type f | head -n 1)
          
          if [ -n "$FOUND_ENV" ]; then
            echo "Found .env at $FOUND_ENV"
            cat "$FOUND_ENV"
            cat "$FOUND_ENV" >> $GITHUB_ENV
          else
            echo "Warning: .env file not found anywhere in workspace. Falling back to parsing CMakeLists.txt."
            
            # Extract PROJECT_NAME (e.g. project(NavyArp ...))
            PROJECT_NAME=$(grep -E -i "project\([A-Za-z0-9_]+" CMakeLists.txt | head -n 1 | sed -E 's/[Pp]roject\(([A-Za-z0-9_]+).*/\1/' || true)
            if [ -z "$PROJECT_NAME" ]; then
              PROJECT_NAME="NavyArp"
            fi
            echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_ENV
            echo "Parsed PROJECT_NAME: $PROJECT_NAME"

            # Extract PRODUCT_NAME (e.g. PRODUCT_NAME "Navy Arp")
            PRODUCT_NAME=$(grep -i "PRODUCT_NAME" CMakeLists.txt | head -n 1 | sed -E 's/.*PRODUCT_NAME[[:space:]]+"?([^"\)]+)"?.*/\1/' || true)
            if [ -z "$PRODUCT_NAME" ]; then
              PRODUCT_NAME="Navy Arp"
            fi
            echo "PRODUCT_NAME=$PRODUCT_NAME" >> $GITHUB_ENV
            echo "Parsed PRODUCT_NAME: $PRODUCT_NAME"

            # Extract VERSION (e.g. VERSION "1.0.0")
            VERSION=$(grep -E -i "VERSION[[:space:]]+\"[0-9]+\.[0-9]+\.[0-9]+\"" CMakeLists.txt | head -n 1 | sed -E 's/.*VERSION[[:space:]]+\"([0-9]+\.[0-9]+\.[0-9]+)\".*/\1/' || true)
            if [ -z "$VERSION" ]; then
              VERSION="1.0.0"
            fi
            echo "VERSION=$VERSION" >> $GITHUB_ENV
            echo "Parsed VERSION: $VERSION"
          fi

      # Set paths for target packaging (Including Standalone, VST3, and CLAP)
      - name: Set additional env vars for next steps
        run: |
          ARTIFACTS_PATH=${{ env.BUILD_DIR }}/${{ env.PROJECT_NAME }}_artefacts/${{ env.BUILD_TYPE }}
          echo "ARTIFACTS_PATH=$ARTIFACTS_PATH" >> $GITHUB_ENV
          echo "VST3_PATH=$ARTIFACTS_PATH/VST3/${{ env.PRODUCT_NAME }}.vst3" >> $GITHUB_ENV
          echo "STANDALONE_EXE_PATH=$ARTIFACTS_PATH/Standalone/${{ env.PRODUCT_NAME }}.exe" >> $GITHUB_ENV
          echo "CLAP_PATH=$ARTIFACTS_PATH/CLAP/${{ env.PRODUCT_NAME }}.clap" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=${{ env.PRODUCT_NAME }}-${{ env.VERSION }}-Windows" >> $GITHUB_ENV

      # Test the VST3 using pluginval v1.0.4 (latest stable)
      - name: Pluginval
        run: |
          curl -LO "https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_Windows.zip"
          7z x pluginval_Windows.zip
          "${{ env.PLUGINVAL_BINARY }}" --strictness-level 10 --verbose --validate "${{ env.VST3_PATH }}"

      # Copy built files to workspace Artifacts directory expected by the Inno Setup script
      - name: Prepare Artifacts for Installer
        run: |
          mkdir -p Artifacts/Standalone
          mkdir -p Artifacts/VST3
          mkdir -p Artifacts/CLAP
          
          # Copy VST3 & Standalone
          cp -r "${{ env.VST3_PATH }}" Artifacts/VST3/
          cp -r "${{ env.STANDALONE_EXE_PATH }}" Artifacts/Standalone/
          
          # Copy CLAP if it was successfully built, otherwise create a placeholder to avoid iscc failure
          if [ -d "${{ env.CLAP_PATH }}" ] || [ -f "${{ env.CLAP_PATH }}" ]; then
            cp -r "${{ env.CLAP_PATH }}" Artifacts/CLAP/
            echo "Successfully prepared CLAP binary."
          else
            echo "Warning: CLAP target not found at ${{ env.CLAP_PATH }}. Generating a fallback placeholder."
            touch "Artifacts/CLAP/${{ env.PRODUCT_NAME }}.clap"
          fi
          
          echo "Workspace Artifacts folder structure:"
          find Artifacts -maxdepth 3

      # Package Windows Inno Setup Installer
      - name: Generate Installer
        run: |
          iscc "packaging/installer.iss"
          mv "Artifacts/Navy_Arp_Installer.exe" "${{ env.ARTIFACTS_PATH }}/${{ env.ARTIFACT_NAME }}.exe"

      # Upload Packaged Artifacts (Windows Exe Installer)
      - name: Upload Exe
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}.exe
          path: "${{ env.ARTIFACTS_PATH }}/${{ env.ARTIFACT_NAME }}.exe"
