name: CI Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: cmake -B Builds -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -G Ninja .

      - name: Build Plugin & Standalone
        run: cmake --build Builds --config ${{ env.BUILD_TYPE }} --parallel

      - name: Locate Built Artifacts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p Artifacts/VST3 Artifacts/Standalone
          cp -R "Builds/NavyArp_artefacts/${{ env.BUILD_TYPE }}/VST3/Navy Arp.vst3" Artifacts/VST3/
          cp -R "Builds/NavyArp_artefacts/${{ env.BUILD_TYPE }}/Standalone/Navy Arp.app" Artifacts/Standalone/

      - name: Locate Built Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p Artifacts/VST3 Artifacts/Standalone
          cp -R "Builds/NavyArp_artefacts/${{ env.BUILD_TYPE }}/VST3/Navy Arp.vst3" Artifacts/VST3/
          cp "Builds/NavyArp_artefacts/${{ env.BUILD_TYPE }}/Standalone/Navy Arp.exe" Artifacts/Standalone/

      - name: Upload Built VST3
        uses: actions/upload-artifact@v4
        with:
          name: NavyArp-${{ matrix.name }}-VST3
          path: Artifacts/VST3/

      - name: Upload Built Standalone
        uses: actions/upload-artifact@v4
        with:
          name: NavyArp-${{ matrix.name }}-Standalone
          path: Artifacts/Standalone/
