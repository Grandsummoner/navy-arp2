name: Pamplejuce

on:
  workflow_dispatch: # Lets you run a build manually from the GitHub UI
  workflow_call:     # Lets other workflows (like release.yml) call this one
  push:
    branches:
      - main
      - develop
  pull_request:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  BUILD_DIR: Builds
  SCCACHE_GHA_ENABLED: true
  IPP_DIR: C:\Program Files (x86)\Intel\oneAPI\ipp\latest\lib\cmake\ipp
  PLUGINVAL_BINARY: ./pluginval.exe
  EXTRA_FLAGS: -G Ninja -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl

defaults:
  run:
    shell: bash

jobs:
  build_and_test:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    name: Windows Build
    runs-on: windows-latest

    steps:
      # Setup MSVC toolchain and developer command prompt
      - uses: ilammy/msvc-dev-cmd@v1

      # Install IPP
      - name: Install IPP
        run: |
          nuget install intelipp.static.win-x64 -Version 2026.0.0.712

      # Install Ninja
      - name: Install Ninja
        run: choco install ninja

      # Checkout recursive submodules (JUCE)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Cache the build artifact outputs
      - name: Cache the build
        uses: mozilla-actions/sccache-action@v0.0.10

      # Configure CMake with Windows-specific compiler flags
      - name: Configure
        run: cmake -B ${{ env.BUILD_DIR }} -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache ${{ env.EXTRA_FLAGS }} .

      # Build Targets
      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ env.BUILD_TYPE }} --parallel

      # Test & Benchmarks via CTest
      - name: Test & Benchmarks
        working-directory: ${{ env.BUILD_DIR }}
        run: ctest --verbose --output-on-failure

      # Read in configuration environment vars generated by CMake
      - name: Read in .env from CMake
        run: |
          cat .env
          cat .env >> $GITHUB_ENV

      # Set paths for target packaging (Including Standalone)
      - name: Set additional env vars for next steps
        run: |
          ARTIFACTS_PATH=${{ env.BUILD_DIR }}/${{ env.PROJECT_NAME }}_artefacts/${{ env.BUILD_TYPE }}
          echo "ARTIFACTS_PATH=$ARTIFACTS_PATH" >> $GITHUB_ENV
          echo "VST3_PATH=$ARTIFACTS_PATH/VST3/${{ env.PRODUCT_NAME }}.vst3" >> $GITHUB_ENV
          echo "STANDALONE_EXE_PATH=$ARTIFACTS_PATH/Standalone/${{ env.PRODUCT_NAME }}.exe" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=${{ env.PRODUCT_NAME }}-${{ env.VERSION }}-Windows" >> $GITHUB_ENV

      # Test the VST3 using pluginval
      - name: Pluginval
        run: |
          curl -LO "https://github.com/Tracktion/pluginval/releases/download/v1.0.3/pluginval_Windows.zip"
          7z x pluginval_Windows.zip
          ${{ env.PLUGINVAL_BINARY }} --strictness-level 10 --verbose --validate "${{ env.VST3_PATH }}"

      # Package Windows Inno Setup Installer
      - name: Generate Installer
        run: |
          iscc "packaging\installer.iss"
          mv "packaging/Output/${{ env.ARTIFACT_NAME }}.exe" "${{ env.ARTIFACTS_PATH }}/"

      # Upload Packaged Artifacts (Windows Exe Installer)
      - name: Upload Exe
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}.exe
          path: "${{ env.ARTIFACTS_PATH }}/${{ env.ARTIFACT_NAME }}.exe"
