name: CI Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build & Package (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Forces the runner to use MSVC (cl.exe) instead of MinGW/GCC
      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -B Builds -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -G Ninja .

      - name: Build Plugin & Standalone
        run: cmake --build Builds --config ${{ env.BUILD_TYPE }} --parallel

      # Gather raw compiled binaries into a standardized folder structure
      - name: Locate Built Artifacts
        shell: bash
        run: |
          mkdir -p Artifacts/VST3 Artifacts/Standalone
          cp -R "Builds/NavyArp_artefacts/${{ env.BUILD_TYPE }}/VST3/Navy Arp.vst3" Artifacts/VST3/
          cp "Builds/NavyArp_artefacts/${{ env.BUILD_TYPE }}/Standalone/Navy Arp.exe" Artifacts/Standalone/

      # Run Inno Setup compiler (ISCC) to bundle the Artifacts/ folder into an installer
      - name: Build Windows Setup Installer
        shell: pwsh
        run: iscc "packaging/installer.iss"

      # Upload the single, unified Setup Installer file
      - name: Upload Windows Setup Installer
        uses: actions/upload-artifact@v4
        with:
          name: NavyArp-Windows-Installer
          path: Artifacts/Navy_Arp_Installer.exe
